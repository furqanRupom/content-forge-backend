
services:
  postgres:
    image: postgres:16-alpine
    container_name: cforge_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: content-forge
      POSTGRES_PASSWORD: cforge123
      POSTGRES_DB: cforge_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U content-forge -d cforge_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
